<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Electoral La Plata</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --border: #e0e0e0;
    --accent: #1e3a8a;
    --accent2: #fbbf24;
    --text: #0f172a;
    --muted: #64748b;
    --user-bg: #eff6ff;
    --ai-bg: #f8fafc;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 20px;
    border-bottom: 3px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 14px;
    background: #ffffff;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(30, 58, 138, 0.08);
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent) 0%, #0c4a6e 100%);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 20px;
    color: var(--accent2);
    font-family: 'Poppins', sans-serif;
  }

  header h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header span {
    font-size: 10px;
    color: var(--accent2);
    margin-left: auto;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    background: linear-gradient(180deg, #ffffff 0%, #f0f9ff 100%);
  }

  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }

  .msg {
    max-width: 700px;
    animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; }
  .msg.ai { align-self: flex-start; }

  .bubble {
    padding: 13px 16px;
    border-radius: 0;
    font-size: 13px;
    line-height: 1.7;
    border: 2px solid var(--border);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border-left: 4px solid var(--accent);
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border-left: 4px solid var(--accent2);
  }

  .msg.ai .bubble strong { color: var(--accent); font-weight: 700; }
  .msg.ai .bubble em { color: var(--accent2); }

  .label {
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 5px;
    font-family: 'Poppins', sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .msg.user .label { text-align: right; }

  .thinking {
    display: flex;
    gap: 6px;
    padding: 13px 16px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  footer {
    padding: 16px 20px;
    border-top: 3px solid var(--accent);
    background: #ffffff;
    flex-shrink: 0;
    box-shadow: 0 -2px 8px rgba(30, 58, 138, 0.08);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: #ffffff;
    border: 2px solid var(--accent);
    border-radius: 0;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    padding: 11px 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus { 
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
  }
  textarea::placeholder { color: var(--muted); }

  button {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent) 0%, #0c4a6e 100%);
    border: none;
    border-radius: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    font-weight: 700;
  }

  button:hover { opacity: 0.9; transform: translateY(-2px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button svg { width: 20px; height: 20px; stroke: #ffffff; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }

  .chip {
    font-size: 11px;
    padding: 7px 12px;
    border: 2px solid var(--accent);
    border-radius: 0;
    color: var(--accent);
    cursor: pointer;
    background: transparent;
    width: auto;
    height: auto;
    font-family: 'Poppins', sans-serif;
    transition: all 0.2s;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-size: 10px;
  }

  .chip:hover { 
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(251, 191, 36, 0.08);
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .welcome h2 {
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }

  .welcome p { 
    font-size: 13px;
    font-weight: 500;
    line-height: 1.8;
    color: var(--muted);
  }

  table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12px; }
  th { text-align: left; color: #ffffff; background: var(--accent); font-weight: 700; padding: 8px 10px; font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(251, 191, 36, 0.06); }
</style>
</head>
<body>

<header>
  <div class="logo">🗳</div>
  <h1>Chat Electoral La Plata</h1>
  <span>Análisis de datos</span>
</header>

<div id="chat">
  <div class="welcome">
    <h2>Chat Electoral<br>La Plata</h2>
    <p>Analizá datos y tendencias electorales del municipio de La Plata (2013–2023)<br>Hacé tus preguntas sobre resultados, partidos y evoluciones políticas.</p>
  </div>
</div>

<footer>
  <div class="chips" id="chips">
    <button class="chip" onclick="sendChip(this)">¿Quién ganó intendencia 2019?</button>
    <button class="chip" onclick="sendChip(this)">Crecimiento Libertad Avanza</button>
    <button class="chip" onclick="sendChip(this)">PASO vs Generales 2023</button>
    <button class="chip" onclick="sendChip(this)">Tendencia peronismo</button>
  </div>
  <div class="input-row">
    <textarea id="input" placeholder="Preguntá sobre elecciones en La Plata…" rows="1"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</footer>

- Si te preguntan algo fuera del alcance, decilo claramente`;

const API_KEY = 'sk-ant-v5c42zznfh7q32oqungh7kgqpgq7u3wxfkf347s2czqbj63bkywqz3nqawaiqma'; // API Key personal

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const chipsEl = document.getElementById('chips');

let history = [];
let loading = false;

function formatMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.*?)__/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:#eff6ff;color:#1e3a8a;padding:1px 5px;border-radius:3px;font-size:12px">$1</code>')
    .replace(/^### (.+)$/gm, '<strong style="color:#1e3a8a;display:block;margin-top:8px">$1</strong>')
    .replace(/^## (.+)$/gm, '<strong style="color:#1e3a8a;display:block;margin-top:10px;font-size:15px">$1</strong>')
    .replace(/^- (.+)$/gm, '<span style="display:block;padding-left:12px;position:relative"><span style="position:absolute;left:2px;color:#1e3a8a">·</span>$1</span>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'Vos' : 'Analista';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = role === 'ai' ? formatMarkdown(text) : text.replace(/\n/g, '<br>');

  msg.appendChild(label);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addThinking() {
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'thinking';

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'Analista';

  const bubble = document.createElement('div');
  bubble.className = 'bubble thinking';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  msg.appendChild(label);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || loading) return;

  chipsEl.style.display = 'none';
  loading = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  const thinkingEl = addThinking();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY
      },
      body: JSON.stringify({
        model: 'claude-3-5-haiku-20241022',
        max_tokens: 800,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    thinkingEl.remove();

    if (!response.ok) {
      throw new Error(data.error?.message || 'Error en la API');
    }

    const reply = data.content?.find(b => b.type === 'text')?.text || 'No pude generar una respuesta.';
    history.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);

  } catch (err) {
    thinkingEl.remove();
    addMessage('ai', `⚠️ Error: ${err.message}`);
  }

  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

function sendChip(btn) {
  input.value = btn.textContent;
  sendMessage();
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
